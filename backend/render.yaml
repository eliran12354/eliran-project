services:
  - type: web
    name: map-my-home-backend
    env: node
    buildCommand: npm ci && npx playwright install chromium && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"

